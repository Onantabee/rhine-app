<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head">
    <style>
        body {
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f4f5;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
        }

        .content {
            padding: 24px;
            color: #3f3f46;
            line-height: 1.6;
            font-size: 16px;
        }

        .content p {
            margin: 0 0 16px;
        }

        .header {
            font-size: 32px;
            width: 100%;
            font-weight: 600;
            text-align: center;
            padding: 12px;
        }

        .greeting {
            font-size: 18px;
            font-weight: 600;
        }

        .button-wrapper {
            text-align: center;
            margin: 32px 0;
        }

        .button {
            display: inline-block;
            background-color: #7733ff;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 16px;
            padding: 10px 18px;
            transition: background-color 0.2s;
        }

        .link {
            color: #2563eb;
            word-break: break-all;
            text-decoration: underline;
        }

        .footer {
            padding: 10px 20px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }

        .otp-code {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #64748b;
            background-color: transparent;
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
        }
    </style>
</head>

<body>
    <div th:fragment="email-wrapper (contentFragment)">
        <div class="container">
            <div class="content">
                <th:block th:replace="${contentFragment}"></th:block>
            </div>
            <div class="footer">
                <p>&copy; 2026 Rhine. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>

</html>
