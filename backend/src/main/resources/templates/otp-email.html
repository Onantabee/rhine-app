<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head}"></head>

<body>
    <div th:replace="~{fragments/layout :: email-wrapper(~{:: #content})}">
        <div id="content">
            <p class="header">Verify your email</p>
            <p class="greeting">Hello,</p>
            <p>You recently requested a verification code for your Rhine account. Please use the code below to complete
                the verification process.</p>

            <div class="otp-code" th:text="${otpCode}">000000</div>

            <p>This code will expire in 15 minutes.</p>
            <p style="font-size: 14px; color: #64748b;">If you did not request this code, you can
                safely ignore this email.</p>
        </div>
    </div>
</body>

</html>
